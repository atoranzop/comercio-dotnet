name: Continous Integration (CI) - Comercio

on:
  push:
    branches: [ master, feature/* ]
  pull_request:
    branches: [ master ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Clone repository
      uses: actions/checkout@v4
    
    - name: Set up .NET 10 SDK
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 10.0.x
    
    - name: Restore NuGet dependencies
      run: dotnet restore Comercio.sln

    - name: Compile the solution (Release mode)
      run: dotnet build Comercio.sln --configuration Release --no-restore
    
    - name: Run unit and integration tests
      run: dotnet test Comercio.sln --configuration Release --no-build --verbosity normal